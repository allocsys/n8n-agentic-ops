name: Deploy CRM Worker

on:
  push:
    branches: [main]
    paths:
      - "crm-worker/**"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: crm-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Deploy to Cloudflare Workers
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy | tee deploy_output.txt
          URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' deploy_output.txt | head -n1)
          if [ -z "$URL" ]; then
            echo "Could not find deployed URL in wrangler output" >&2
            exit 1
          fi
          echo "worker_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Write deployed URL back into the repo
        run: |
          echo "${{ steps.deploy.outputs.worker_url }}" > DEPLOYED_URL.txt
          echo "Last deployed: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> DEPLOYED_URL.txt

      - name: Commit DEPLOYED_URL.txt if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DEPLOYED_URL.txt
          git diff --staged --quiet || git commit -m "chore: update deployed CRM worker URL [skip ci]"
          git push
